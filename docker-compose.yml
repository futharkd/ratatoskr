services:
  ratatoskr:
    build: .
    image: ratatoskr:local
    ports:
      - "8080:8080"
    environment:
      RATATOSKR_CONFIG: /etc/ratatoskr/ratatoskr.toml
      # Required for the bundled Infisical provider (see deploy/ratatoskr.toml):
      # INFISICAL_PROJECT_ID:
      # INFISICAL_CLIENT_ID:
      # INFISICAL_CLIENT_SECRET:
      # INFISICAL_WEBHOOK_SECRET:
    env_file:
      - path: .env
        required: false
    volumes:
      - ./deploy/ratatoskr.toml:/etc/ratatoskr/ratatoskr.toml:ro
      - ratatoskr-data:/var/lib/ratatoskr

volumes:
  ratatoskr-data:

