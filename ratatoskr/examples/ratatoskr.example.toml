[server]
listen_addr = "127.0.0.1:8080"

[defaults]
replay_tolerance_seconds = 300
http_timeout_seconds = 10
max_retries = 3
retry_backoff_millis = 300

[storage]
backend = "sqlite"
sqlite_path = "./ratatoskr.db"

[mimir.placeholders]
env = false
file = false

# PostgreSQL alternative:
# backend = "postgres"
# postgres_url = "postgres://ratatoskr:ratatoskr@postgres:5432/ratatoskr"

[includes]
# Only these globs are loaded (relative to this file’s directory unless absolute).
# Omit a key or use an empty list to skip that category entirely.
providers = ["config/providers/*.toml"]
security_profiles = ["config/profiles/*.toml"]
services = ["config/services/*.toml"]
